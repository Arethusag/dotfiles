# Enable mouse mode
set -g mouse on

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

# Enable 256-color
set -g default-terminal "screen-256color"
set-option -a terminal-features 'foot:RGB'

# set vi as default editor
set -g status-keys vi

# Horizontal scrolling with less
set -g alternate-screen on 

# history settings
set -g history-limit 500000
set -g buffer-limit 20
set -g display-time 4000
set -g status-interval 5
setw -g aggressive-resize on
set -gq allow-passthrough on

# set parent terminal title
set -g set-titles on
set -g set-titles-string "#I:#W"
setw -g monitor-activity on
set -g visual-activity on
set -g focus-events on
set-window-option -g mode-keys vi
set-window-option -g automatic-rename on

# status
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 40

# Simple monochrome status bar
set -g status-bg black
set -g status-fg white

# Window status
set -g window-status-format " #I:#W "
set -g window-status-current-format "[#I:#W]"
set -g window-status-current-style fg=green,bold

# Left: just session name
set -g status-left "[#S] "

# Right: time and host
set -g status-right " %H:%M #h"

# Forward OSC 52 clipboard from apps (like Vim) to the outer terminal
set -g set-clipboard on
set -as terminal-features 'foot:clipboard'
set -ag update-environment 'WAYLAND_DISPLAY XDG_RUNTIME_DIR DISPLAY XAUTHORITY'
